<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="stylesheet" href="katex/katex.min.css" />
    <script defer src="katex/katex.min.js"></script>
    <script defer src="katex/auto-render.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #ffffff;
        color: #1f2a37;
        font-family: "Segoe UI", Arial, sans-serif;
        overflow: auto;
      }
      body {
        padding: 18px 24px 28px 24px;
        line-height: 1.68;
        font-size: 15px;
      }
      .theory-page {
        max-width: 920px;
        margin: 0 auto;
      }
      h2 {
        margin: 0 0 14px 0;
        font-size: 22px;
        color: #16324f;
      }
      h3 {
        margin: 20px 0 10px 0;
        font-size: 17px;
        color: #16324f;
      }
      p {
        margin: 0 0 12px 0;
      }
      ul,
      ol {
        margin: 0 0 16px 20px;
        padding-left: 18px;
      }
      li {
        margin-bottom: 8px;
      }
      code {
        font-family: "Cascadia Mono", Consolas, monospace;
        background: #f4f7fb;
        padding: 2px 5px;
        border-radius: 4px;
      }
      .math-inline {
        color: #17365d;
      }
      .math-block {
        margin: 16px 0;
        padding: 14px 18px;
        border-radius: 10px;
        background: #f7fbff;
        border: 1px solid #dde8f6;
        overflow-x: auto;
      }
      .summary-card {
        background: #f8fbff;
        border: 1px solid #d9e6f5;
        border-radius: 10px;
        padding: 12px 16px;
        margin-bottom: 12px;
      }
      .katex-display {
        margin: 0.7em 0;
        text-align: left !important;
        overflow-x: auto;
        overflow-y: hidden;
      }
      .katex-display > .katex {
        text-align: left !important;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="theory-page">{{body_html}}</div>
    <script>
      window.addEventListener('load', function () {
        if (window.renderMathInElement) {
          renderMathInElement(document.body, {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '\\[', right: '\\]', display: true },
              { left: '\\(', right: '\\)', display: false },
              { left: '$', right: '$', display: false }
            ],
            throwOnError: false,
            strict: 'ignore'
          });
        }
      });
    </script>
  </body>
</html>
