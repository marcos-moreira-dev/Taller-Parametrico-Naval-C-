<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #ffffff;
        color: #1f2a37;
        font-family: "Segoe UI", Arial, sans-serif;
        overflow: auto;
      }
      body {
        padding: 10px 14px 20px 14px;
        line-height: 1.62;
        font-size: 15px;
      }
      h2 {
        margin: 0 0 12px 0;
        font-size: 20px;
        color: #16324f;
      }
      h3 {
        margin: 18px 0 10px 0;
        font-size: 16px;
        color: #16324f;
      }
      p {
        margin: 0 0 12px 0;
      }
      ul,
      ol {
        margin: 0 0 16px 20px;
        padding-left: 18px;
      }
      li {
        margin-bottom: 8px;
      }
      code {
        font-family: "Cascadia Mono", Consolas, monospace;
        background: #f4f7fb;
        padding: 2px 5px;
        border-radius: 4px;
      }
      .math-inline {
        font-family: "Cascadia Mono", Consolas, monospace;
        background: #f4f7fb;
        padding: 1px 4px;
        border-radius: 4px;
      }
      .math-block {
        margin: 12px 0;
        padding: 10px 12px;
        border-radius: 8px;
        background: #f7fbff;
        font-family: "Cascadia Mono", Consolas, monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    {{body_html}}
  </body>
</html>
